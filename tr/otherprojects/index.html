<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Diğer Projeler — Tuna Baydin</title>

<link rel="stylesheet" href="/assets/css/global.css">
 
<style>
:root{
  --muted:#444;
  --text:#111;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
}

/* Background */
body {
  margin: 0;
  padding-top: 70px;
  font-family: inherit;
}


/* Page title */
.page-header {
  max-width: 900px;
  margin: 40px auto 20px;  /* ✔ same top spacing as Art page */
  padding: 0;
  text-align: center;
  color: #111;
  font-size: 2.3rem;
  font-weight: 700;
}


/* Gallery grid – same as art.html */
.gallery {
  max-width: 1100px;
  margin: 40px auto 80px;
  padding: 0 20px;

  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 24px;
}

/* Each clickable card */
.gallery-item {
  display: block;              /* whole card is clickable */
  text-decoration: none;
  color: #111;

  background: rgba(255,255,255,0.9);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0px 6px 20px rgba(0,0,0,0.18);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.gallery-item:hover,
.gallery-item:focus-visible {
  transform: translateY(-3px);
  box-shadow: 0px 10px 28px rgba(0,0,0,0.28);
}

/* Image cover */
.gallery-cover {
  aspect-ratio: 4 / 5;               /* Instagram-like portrait */
  background-position: center;
  background-repeat: no-repeat;
}

/* Title area */
.gallery-title {
  padding: 10px 12px 12px;
  font-weight: 600;
  font-size: 0.95rem;
  text-align: center;     /* ✔ center titles */
}



/* Footer */
</style>

</head>

<body class="page-with-bg">

<!-- NAVIGATION -->
<div data-partial="/partials/nav.html"></div>


<!-- HEADER -->
<div class="page-header">Diğer Projeler</div>

<div class="gallery">

  <a class="gallery-item" href="/tr/photography/">
    <div class="gallery-cover" style="background-image: url('/assets/otherprojects/theuniversewinks.jpg');"></div>
    <div class="gallery-title">Photography</div>
  </a>

  <a class="gallery-item" href="/tr/crochet/">
    <div class="gallery-cover" style="background-image: url('/assets/otherprojects/blanket.jpg');"></div>
    <div class="gallery-title">Crochet</div>
  </a>

  <a class="gallery-item" href="/tr/dreamreconstruction/">
    <div class="gallery-cover" style="background-image: url('/assets/otherprojects/dream2.png');"></div>
    <div class="gallery-title">Dream Reconstruction</div>
  </a>

  <a class="gallery-item" href="/tr/music/">
    <div class="gallery-cover" style="background-image: url('/assets/otherprojects/littlehuman.jpg');"></div>
    <div class="gallery-title">Music</div>
  </a>

</div>


<!-- FOOTER -->
<div data-partial="/partials/footer.html"></div>

<script>
  // Block right-click on images and videos
  document.addEventListener('contextmenu', function (event) {
    if (event.target.closest('img, video')) {
      event.preventDefault();
    }
  });

  // Optional: also block dragging images/videos off the page
  document.addEventListener('dragstart', function (event) {
    if (event.target.closest('img, video')) {
      event.preventDefault();
    }
  });
</script>


<script src="/assets/js/includes.js" defer></script>
</body>
</html>
