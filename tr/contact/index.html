<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>İletişim — Tuna Baydin</title>
 
<link rel="stylesheet" href="/assets/css/global.css">
 
<style>
:root{
  font-family: system-ui, apple-system, Segoe UI, Roboto, Helvetica, Arial;
  --muted: #444;
}

/* Single merged body block (keeps background image visible) */
body {
  margin: 0;
  padding-top: 70px; /* space for fixed nav */
  background: url("backgroundphoto_1920x1080.jpg") no-repeat center center fixed;
  background-size: cover;
}

/* Contact card */
.card {
  max-width: 800px;
  margin: 6rem auto;
  padding: 48px;
  border-radius: 24px;
  background: rgba(255,255,255,0.92);
  box-shadow: 0 6px 30px rgba(10, 10, 20, 0.06);
}

h1 { font-size: 36px; margin-bottom: 1rem; }
p { font-size: 20px; line-height: 1.6; }
a { color: #0077cc; text-decoration: none; }

/* Contact form styles */
.contact-form {
  margin-top: 2rem;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.form-group {
  text-align: left;
}

.form-group label {
  display: block;
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 6px;
  color: #333;
}

.form-group input,
.form-group textarea {
  width: 100%;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 0.95rem;
  font-family: inherit;
  box-sizing: border-box;
}

.form-group textarea {
  min-height: 120px;
  resize: vertical;
}

/* Submit button */
.contact-form button {
  align-self: flex-start;
  margin-top: 4px;
  padding: 10px 24px;
  border-radius: 999px;
  border: none;
  background: #111;
  color: #fff;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
}

.contact-form button:hover {
  background: #333;
}

 /* Status / thank-you text */
.form-status {
  margin-top: 10px;
  font-size: 0.95rem;
  color: #1b7a2f; /* green-ish success text */
}

.form-status.error {
  color: #b00020; /* red for error */
}
 
  
@media (max-width: 720px) {
  .card { margin: 4rem 1.2rem; padding: 32px; }
}

</style>

</head>

<body>

<!-- TOP NAV -->
<div data-partial="/partials/nav.html"></div>

<!-- CONTACT CARD -->
<div class="card">
  <h1>İletişim</h1>

  <p>Sanat eserleri, sergiler veya iş birlikleri hakkında bilgi almak isterseniz, benimle iletişime geçmekten çekinmeyin.</p>

  
  <p style="margin-top: 2rem;">Ve beni takip edin!</p>

  <p><strong>Instagram:</strong>
    <a href="https://www.instagram.com/ttunartt/" target="_blank">@ttunartt</a>
  </p>

  <p><strong>TikTok:</strong>
    <a href="https://www.tiktok.com/@ttunartt" target="_blank">@ttunartt</a>
  </p>

  <!-- CONTACT FORM (Formspree) -->
  <form class="contact-form"
        action="https://formspree.io/f/xovovaak" 
        method="POST">
    
    <!-- Optional: subject line for the email you receive -->
    <input type="hidden" name="_subject" value="New message from tunabaydin.com">

    <div class="form-group">
      <label for="name">İsim</label>
      <input id="name" name="name" type="text" placeholder="İsminiz" required>
    </div>

    <div class="form-group">
      <label for="email">E-mail adresi</label>
      <input id="email" name="email" type="email" placeholder="you@example.com" required>
    </div>

      <div class="form-group">
      <label for="message">Mesajınız</label>
      <textarea id="message" name="message" placeholder="Mesajınızı buraya yazın..." required></textarea>
    </div>

    <button type="submit">Gönder</button>

    <!-- Status / thank-you message appears here -->
    <div id="form-status" class="form-status"></div>
  </form>

  
</div>

<script>
  const form = document.querySelector(".contact-form");
  const statusEl = document.getElementById("form-status");

  form.addEventListener("submit", async function (event) {
    event.preventDefault(); // don't do normal page reload submit

    statusEl.textContent = "Gönderiyor...";
    statusEl.classList.remove("error");

    const data = new FormData(form);

    try {
      const response = await fetch(form.action, {
        method: form.method,
        body: data,
        headers: { "Accept": "application/json" }
      });

      if (response.ok) {
        // Custom thank-you behavior:
        statusEl.textContent = "Teşekkürler! Mesajınız gönderildi.";
        form.reset();
        // Optional: hide the form after success
        // form.style.display = "none";
      } else {
        statusEl.textContent = "Aman! Mesajınız gönderilirken bir sorun oluştu.";
        statusEl.classList.add("error");
      }
    } catch (error) {
      statusEl.textContent = "Aman! Bir ağ hatası oluştu. Lütfen tekrar deneyin.";
      statusEl.classList.add("error");
    }
  });
</script>

  
<div data-partial="/partials/footer.html"></div>

<script>
  // Block right-click on images and videos
  document.addEventListener('contextmenu', function (event) {
    if (event.target.closest('img, video')) {
      event.preventDefault();
    }
  });

  // Optional: also block dragging images/videos off the page
  document.addEventListener('dragstart', function (event) {
    if (event.target.closest('img, video')) {
      event.preventDefault();
    }
  });
</script>


<script src="/assets/js/includes.js" defer></script>
</body>
</html>
