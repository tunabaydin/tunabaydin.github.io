<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Abduction — Art by Tuna Baydin</title>

<link rel="stylesheet" href="/assets/css/global.css">
 
<style>
:root{
  font-family: system-ui, apple-system, Segoe UI, Roboto, Helvetica, Arial;
  --muted: #444;
}

/* Background image */
body {
  margin: 0;
  padding-top: 70px; /* space for fixed nav */
  background: url("backgroundphoto_1920x1080.jpg") no-repeat center center fixed;
  background-size: cover;
}

/* Artwork card */
.art-card {
  max-width: 1100px;
  margin: 6rem auto;
  padding: 40px 48px 48px;
  border-radius: 24px;
  background: rgba(255,255,255,0.92);
  box-shadow: 0 6px 30px rgba(10, 10, 20, 0.06);
}

/* Back link */
.back-link {
  font-size: 0.9rem;
  margin-bottom: 1rem;
}

.back-link a {
  color: var(--muted);
  text-decoration: none;
}

.back-link a:hover {
  text-decoration: underline;
}

/* Title & meta */
h1 {
  font-size: 32px;
  margin: 0 0 0.35rem;
}

.art-meta {
  margin: 0 0 1.8rem;
}

.art-meta p {
  margin: 0.25rem 0;
  font-size: 0.95rem;
  color: #444;
}



/* Layout: image on left, text on right (can adjust later) */
.art-layout {
  display: flex;
  gap: 28px;
  align-items: flex-start;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}

/* Left column: image (and later video if you want) */
.art-media-column {
  flex: 1 1 340px;
}

/* Image */
.art-image img {
  width: 100%;
  display: block;
  border-radius: 14px;
  box-shadow: 0 8px 26px rgba(0,0,0,0.18);
}

/* Right column: text */
.art-description {
  flex: 1 1 280px;
  font-size: 0.98rem;
  line-height: 1.6;
  color: #222;
}

/* Responsive */
@media (max-width: 800px) {
  .art-card {
    margin: 4rem 1.2rem 5rem;
    padding: 28px 24px 32px;
  }

  .art-layout {
    flex-direction: column;
  }
}

/* Footer */
</style>

</head>

<body>

<!-- TOP NAV -->
<div data-partial="/partials/nav.html"></div>

<!-- ABDUCTION CARD -->
<div class="art-card">

 <p class="back-link"><a id="smart-back" href="/en/art/?back=gallery">← Back</a></p>


  <h1>Abduction</h1>
<div class="art-meta">
  <strong>Materials:</strong> Oil on canvas<br>
  <strong>Year:</strong> 2022<br>
  <strong>Dimensions:</strong> 50 × 100 cm<br>
  <strong>Status:</strong> Not available for purchase<br>
</div>

  
  <div class="art-layout">

    <!-- LEFT: image -->
    <div class="art-media-column">
      <div class="art-image">
        <img src="/assets/art/abduction.jpg" alt="Abduction artwork by Tuna Baydin">
      </div>
    </div>

    <!-- RIGHT: description -->
    <div class="art-description">
      <p>
        What makes us special? What makes us worth being abducted by a taco space ship?
      </p>
      <p>
        This piece is absurd. The scene is inspired by Spanish-speaking Latin America.
      </p>

  <!-- Decoration image (goes under the text) -->
  <div class="art-image" style="margin-top:16px;">
    <img src="/assets/art/abductiondecoration.jpg" alt="Abduction decoration detail">
  </div>

      
    </div>

  </div>

</div>

<div data-partial="/partials/footer.html"></div>

<script>
  // Block right-click on images and videos
  document.addEventListener('contextmenu', function (event) {
    if (event.target.closest('img, video')) {
      event.preventDefault();
    }
  });

  // Optional: also block dragging images/videos off the page
  document.addEventListener('dragstart', function (event) {
    if (event.target.closest('img, video')) {
      event.preventDefault();
    }
  });
</script>

 <script>
  document.addEventListener("DOMContentLoaded", () => {
    const back = document.getElementById("smart-back");
    if (!back) return;

    const from = new URLSearchParams(window.location.search).get("from");

    if (from === "home") {
      back.textContent = "← Back to Home";
      back.href = "/en/?back=home";
    } else {
      back.textContent = "← Back to gallery";
      back.href = "/en/art/?back=gallery";
    }
  });
</script>



<script src="/assets/js/includes.js" defer></script>
</body>
</html>
