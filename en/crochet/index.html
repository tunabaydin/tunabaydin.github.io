<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Crochet — Tuna Baydin</title>

<link rel="stylesheet" href="/assets/css/global.css">
 
<style>
/* Page background image + page layout */
body {
  background: url("backgroundphoto_1920x1080.jpg") no-repeat center center fixed;
  background-size: cover;

  margin: 0;
  font-family: system-ui, sans-serif;
  padding-top: 70px;
  text-align: center;
  color: #111;
}

/* Headings */
h1 {
  font-size: 2.3rem;
}

/* Gallery grid */
.gallery {
  max-width: 1100px;
  margin: 40px auto 80px;
  padding: 0 20px;

  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 24px;
}

/* Each clickable card */
.gallery-item {
  display: block;              /* whole card is clickable */
  text-decoration: none;
  color: #111;

  background: rgba(255,255,255,0.9);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0px 6px 20px rgba(0,0,0,0.18);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.gallery-item:hover,
.gallery-item:focus-visible {
  transform: translateY(-3px);
  box-shadow: 0px 10px 28px rgba(0,0,0,0.28);
}

/* Image cover */
.gallery-cover {
  aspect-ratio: 4 / 5;               /* Instagram-like portrait */
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* Title area */
.gallery-title {
  padding: 10px 12px 12px;
  font-weight: 600;
  font-size: 0.95rem;
}



/* Photography full-width rows */
.photo-section {
  max-width: 1100px;
  margin: 40px auto 80px;
  padding: 0 20px;
}

.photo-row {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 50px;
  background: rgba(255,255,255,0.92);
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
}

.photo-row:nth-child(even) {
  flex-direction: row-reverse; /* alternate layout for visual rhythm */
}

.photo-img {
  width: 55%;
  border-radius: 12px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.18);
}

.photo-text {
  flex: 1;
  text-align: left;
}

.photo-text h2 {
  font-size: 1.5rem;
  margin-bottom: 10px;
}

.photo-text p {
  font-size: 1rem;
  line-height: 1.6;
  color: #333;
}

/* Responsive stacking */
@media (max-width: 800px) {
  .photo-row,
  .photo-row:nth-child(even) {
    flex-direction: column;
  }

  .photo-img {
    width: 100%;
  }

  .photo-text {
    text-align: center;
  }
}
  
  
</style>

</head>

<body>

<!-- Navigation -->
<div data-partial="/partials/nav.html"></div>



<h1>Crochet</h1>

<div class="photo-section">

  <div class="photo-row">
    <img class="photo-img" src="/assets/otherprojects/blanket.jpg" alt="Blanket">
    <div class="photo-text">
      <h2>Blanket</h2>
      <p>
      I made this blanket.
      </p>
    </div>
  </div>

</div>




 <div data-partial="/partials/footer.html"></div>
 
<script>
  // Block right-click on images and videos
  document.addEventListener('contextmenu', function (event) {
    if (event.target.closest('img, video')) {
      event.preventDefault();
    }
  });

  // Optional: also block dragging images/videos off the page
  document.addEventListener('dragstart', function (event) {
    if (event.target.closest('img, video')) {
      event.preventDefault();
    }
  });
</script>

  
<script src="/assets/js/includes.js" defer></script>
</body>
</html>
